<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="映画、アニメ、書籍などの鑑賞記録を管理するアプリ">
    <meta name="theme-color" content="#262626">

    <title>鑑賞記録</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="container">
        <div class="grid-main">

            <!-- ========== 入力フォーム ========== -->
            <section class="card">
                <h2 class="section-title">
                    <i data-lucide="plus" class="btn-icon"></i>
                    新規記録
                </h2>

                <form id="record-form" class="space-y" style="margin-top: var(--sp-md);">
                    <!-- タイトル -->
                    <div class="form-group">
                        <label class="form-label" for="title">タイトル</label>
                        <input class="form-input" type="text" id="title" name="title" required>
                    </div>

                    <!-- 媒体 & ジャンル -->
                    <div class="grid-2col">
                        <div class="form-group">
                            <label class="form-label" for="medium">媒体</label>
                            <select class="form-select" id="medium" name="medium"></select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="genre">ジャンル</label>
                            <select class="form-select" id="genre" name="genre"></select>
                        </div>
                    </div>

                    <!-- 鑑賞日 & 評価 -->
                    <div class="grid-2col">
                        <div class="form-group">
                            <label class="form-label" for="date">鑑賞日</label>
                            <input class="form-input" type="date" id="date" name="date">
                        </div>
                        <div class="form-group">
                            <label class="form-label">
                                評価: <span id="rating-label" class="text-bold">普通</span>
                            </label>
                            <input class="form-range" type="range" id="rating" name="rating" min="0" max="3" step="1"
                                value="0">
                            <div class="form-range-labels">
                                <span>普通</span>
                                <span>人生</span>
                            </div>
                        </div>
                    </div>

                    <!-- 場所 -->
                    <div class="form-group">
                        <label class="form-label" for="location">場所</label>
                        <input class="form-input" type="text" id="location" name="location" placeholder="映画館、自宅、URLなど">
                    </div>

                    <!-- タグ -->
                    <div class="form-group">
                        <label class="form-label" for="tags">タグ</label>
                        <input class="form-input" type="text" id="tags" name="tags" placeholder="SF, 考察, おすすめ">
                    </div>

                    <!-- 内容 -->
                    <div class="form-group">
                        <label class="form-label" for="content">内容</label>
                        <textarea class="form-textarea" id="content" name="content" rows="5"></textarea>
                    </div>

                    <!-- 保存ボタン -->
                    <button type="submit" class="btn btn-primary btn-block">
                        <i data-lucide="save" class="btn-icon"></i>
                        記録を保存
                    </button>
                </form>
            </section>

            <!-- ========== 記録一覧 ========== -->
            <section class="records-panel">

                <!-- コントロールバー -->
                <div class="card card--compact control-bar">
                    <div class="control-group">
                        <div>
                            <span class="control-label">ソート順</span>
                            <div class="flex-center gap-sm">
                                <select id="sort-by" class="form-select form-select--sm">
                                    <option value="createdAt">作成日</option>
                                    <option value="date">鑑賞日</option>
                                    <option value="rating">評価</option>
                                    <option value="genre">ジャンル</option>
                                    <option value="medium">媒体</option>
                                    <option value="title">タイトル</option>
                                </select>
                                <button id="sort-order-btn" class="sort-btn" title="昇順/降順切り替え">
                                    <i data-lucide="arrow-up-down" class="btn-icon"
                                        style="color: var(--c-text-sub);"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex-center gap-sm">
                        <label class="btn btn-secondary file-upload-label">
                            <i data-lucide="file-up" class="btn-icon"></i>
                            読込
                            <input type="file" id="file-input" accept=".md">
                        </label>
                        <button id="download-all-btn" class="btn btn-primary" disabled>
                            <i data-lucide="file-down" class="btn-icon"></i>
                            一括保存
                        </button>
                    </div>
                </div>

                <!-- 一覧パネル -->
                <div class="card" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
                    <h2 class="section-title" style="margin-bottom: var(--sp-md); flex-shrink:0;">
                        記録一覧
                        <span id="record-count" class="count">(0)</span>
                    </h2>
                    <div id="records-list" class="records-list">
                        <p class="records-empty">記録がありません。</p>
                    </div>
                </div>

            </section>

        </div>
    </main>

    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- App -->
    <script src="app.js"></script>
</body>

</html>
